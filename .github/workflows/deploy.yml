name: Deploy

on:
 push:
   branches:
    - main

jobs:
 deploy:
   runs-on: ubuntu-latest

   steps:

   - uses: actions/checkout@v4

   - name: SSH Deploy
     uses: appleboy/ssh-action@v1

     with:
       host: ${{ secrets.HOST }}
       username: dhruba
       key: ${{ secrets.SSH_KEY }}
    

       script: |
         cd /home/dhruba/project/two-tier-flask-aplication
         git pull
         docker compose up -d --build